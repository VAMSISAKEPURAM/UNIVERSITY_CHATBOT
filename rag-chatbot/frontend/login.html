<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | SVU AI Assistant</title>
    <!-- Combined Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="login-body">
    <!-- Background Animated Blobs -->
    <div class="blob" style="top: 10%; left: 10%;"></div>
    <div class="blob" style="bottom: 10%; right: 10%; background: rgba(13, 110, 253, 0.2);"></div>

    <div class="login-card">
        <div class="nav-logo" style="justify-content: center; margin-bottom: 20px;">
            <i class="fas fa-university"></i>
            <span>SVU Assistant</span>
        </div>
        <h2>Welcome Back</h2>
        <p style="color: var(--text-muted); margin-bottom: 30px;">Please login to your account</p>
        
        <form id="login-form">
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" class="form-input" placeholder="name@university.edu" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" class="form-input" placeholder="••••••••" required>
            </div>
            
            <p id="error-message" class="error-text">Please fill in all fields correctly.</p>

            <button type="submit" class="btn btn-primary btn-block">Login</button>
            
            <div style="margin: 20px 0; display: flex; align-items: center; gap: 10px; color: var(--text-muted);">
                <hr style="flex: 1; border: 0.5px solid var(--border-color);">
                <span>OR</span>
                <hr style="flex: 1; border: 0.5px solid var(--border-color);">
            </div>

            <button type="button" id="guest-btn" class="btn btn-guest btn-block">Continue as Guest</button>
        </form>
    </div>

    <script src="script.js"></script>
</body>
</html>
